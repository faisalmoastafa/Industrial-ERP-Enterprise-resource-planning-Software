[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo", "php82Extensions.pdo_sqlite", "php82Extensions.mbstring", "php82Extensions.xml", "php82Extensions.curl", "php82Extensions.zip", "php82Extensions.gd", "php82Extensions.tokenizer", "php82Extensions.bcmath", "php82Extensions.fileinfo", "php82Extensions.intl", "php82Extensions.openssl", "php82Packages.composer"]

[phases.install]
cmds = [
  "mkdir -p bootstrap/cache storage/framework/cache/data storage/framework/sessions storage/framework/views storage/logs storage/app/public",
  "chmod -R 777 bootstrap/cache storage",
  "cp .env.railway .env",
  "COMPOSER_ALLOW_SUPERUSER=1 composer install --no-dev --optimize-autoloader --ignore-platform-reqs"
]

[phases.build]
cmds = ["echo 'Build complete'"]

[start]
cmd = "bash railway-start.sh"
